<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Scientific Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Dark theme colors */
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-tertiary: #ec4899;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;

            /* Button colors */
            --btn-function: #2d3748;
            --btn-number: #2a2a3a;
            --btn-operator: #4f46e5;
            --btn-equals: #7c3aed;
            --btn-clear: #e53e3e;
            --btn-history: #4a5568;

            /* Shadow effects */
            --shadow-light: rgba(0, 0, 0, 0.3);
            --shadow-medium: rgba(0, 0, 0, 0.5);
            --shadow-heavy: rgba(0, 0, 0, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary), #0f0f1f);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .calculator-container {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        .calculator-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary), var(--accent-tertiary));
            border-radius: 24px;
            z-index: -1;
            filter: blur(10px);
            opacity: 0.6;
        }

        .calculator {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 25px;
            box-shadow:
                0 20px 40px var(--shadow-heavy),
                inset 0 0 20px rgba(99, 102, 241, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            position: relative;
            overflow: hidden;
        }

        .calculator::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), var(--accent-secondary), transparent);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-tertiary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .display {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            position: relative;
            overflow: hidden;
        }

        .display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
        }

        .expression {
            color: var(--text-secondary);
            font-size: 1rem;
            min-height: 24px;
            text-align: right;
            margin-bottom: 8px;
            opacity: 0.7;
            font-family: 'Courier New', monospace;
        }

        .result {
            color: var(--text-primary);
            font-size: 2.5rem;
            font-weight: 600;
            text-align: right;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            transition: all 0.3s ease;
        }

        .result.error {
            color: var(--error);
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .btn {
            border: none;
            outline: none;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            border-radius: 12px;
            padding: 16px 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            font-family: inherit;
            user-select: none;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-number {
            background: var(--btn-number);
            color: var(--text-primary);
            box-shadow: 0 4px 15px var(--shadow-light);
        }

        .btn-number:hover {
            background: #3a3a4a;
            box-shadow: 0 6px 20px var(--shadow-medium);
        }

        .btn-function {
            background: var(--btn-function);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .btn-function:hover {
            background: #3d4455;
            color: var(--text-primary);
        }

        .btn-operator {
            background: var(--btn-operator);
            color: white;
        }

        .btn-operator:hover {
            background: #5a52e0;
        }

        .btn-equals {
            background: var(--btn-equals);
            color: white;
        }

        .btn-equals:hover {
            background: #6d2bd6;
        }

        .btn-clear {
            background: var(--btn-clear);
            color: white;
        }

        .btn-clear:hover {
            background: #f13e3e;
        }

        .btn-history {
            background: var(--btn-history);
            color: white;
        }

        .btn-history:hover {
            background: #5a6270;
        }

        .btn-span-2 {
            grid-column: span 2;
        }

        .btn-span-3 {
            grid-column: span 3;
        }

        .history-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 450px;
            max-height: 70vh;
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 40px var(--shadow-heavy);
            z-index: 1000;
            display: none;
            flex-direction: column;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .history-panel.active {
            display: flex;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
        }

        .history-title {
            color: var(--text-primary);
            font-size: 1.2rem;
            font-weight: 600;
        }

        .close-history {
            background: var(--btn-clear);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .close-history:hover {
            background: #f13e3e;
        }

        .history-content {
            flex: 1;
            overflow-y: auto;
            max-height: 400px;
        }

        .history-item {
            color: var(--text-secondary);
            font-size: 0.9rem;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-expression {
            flex: 1;
            text-align: left;
        }

        .history-result {
            color: var(--accent-primary);
            font-weight: 600;
            margin-left: 10px;
        }

        .memory-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-tertiary);
            border-radius: 50%;
            margin-right: 5px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .memory-indicator.active {
            opacity: 1;
        }

        .history-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 999;
            display: none;
        }

        .history-overlay.active {
            display: block;
        }

        @media (max-width: 600px) {
            .calculator {
                padding: 15px;
            }

            .buttons-grid {
                grid-template-columns: repeat(4, 1fr);
            }

            .btn-span-3, .btn-span-2 {
                grid-column: span 2 !important;
            }

            .result {
                font-size: 2rem;
            }

            .title {
                font-size: 1.5rem;
            }

            .history-panel {
                width: 95%;
                max-width: 95%;
                max-height: 80vh;
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .glow {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <div class="calculator">
            <div class="header">
                <h1 class="title">Nexus Scientific</h1>
                <p class="subtitle">Advanced Calculator with Full Functionality</p>
            </div>

            <div class="display">
                <div class="expression" id="expression">0</div>
                <div class="result" id="result">0</div>
            </div>

            <div class="buttons-grid">
                <!-- Row 1 -->
                <button class="btn btn-clear" onclick="clearAll()">AC</button>
                <button class="btn btn-clear" onclick="clearEntry()">CE</button>
                <button class="btn btn-function" onclick="appendToDisplay('(')">(</button>
                <button class="btn btn-function" onclick="appendToDisplay(')')">)</button>
                <button class="btn btn-operator" onclick="appendToDisplay('/')">÷</button>

                <!-- Row 2 -->
                <button class="btn btn-function" onclick="appendToDisplay('sin(')">sin</button>
                <button class="btn btn-function" onclick="appendToDisplay('cos(')">cos</button>
                <button class="btn btn-function" onclick="appendToDisplay('tan(')">tan</button>
                <button class="btn btn-function" onclick="appendToDisplay('sqrt(')">√</button>
                <button class="btn btn-operator" onclick="appendToDisplay('*')">×</button>

                <!-- Row 3 -->
                <button class="btn btn-function" onclick="appendToDisplay('log(')">log</button>
                <button class="btn btn-function" onclick="appendToDisplay('ln(')">ln</button>
                <button class="btn btn-function" onclick="appendToDisplay('^')">^</button>
                <button class="btn btn-function" onclick="appendToDisplay('!')">x!</button>
                <button class="btn btn-operator" onclick="appendToDisplay('-')">−</button>

                <!-- Row 4 -->
                <button class="btn btn-number" onclick="appendToDisplay('7')">7</button>
                <button class="btn btn-number" onclick="appendToDisplay('8')">8</button>
                <button class="btn btn-number" onclick="appendToDisplay('9')">9</button>
                <button class="btn btn-function" onclick="appendToDisplay('π')">π</button>
                <button class="btn btn-operator" onclick="appendToDisplay('+')">+</button>

                <!-- Row 5 -->
                <button class="btn btn-number" onclick="appendToDisplay('4')">4</button>
                <button class="btn btn-number" onclick="appendToDisplay('5')">5</button>
                <button class="btn btn-number" onclick="appendToDisplay('6')">6</button>
                <button class="btn btn-function" onclick="appendToDisplay('e')">e</button>
                <button class="btn btn-operator" onclick="appendToDisplay('-')">−</button>

                <!-- Row 6 -->
                <button class="btn btn-number" onclick="appendToDisplay('1')">1</button>
                <button class="btn btn-number" onclick="appendToDisplay('2')">2</button>
                <button class="btn btn-number" onclick="appendToDisplay('3')">3</button>
                <button class="btn btn-function" onclick="appendToDisplay('.')">.</button>
                <button class="btn btn-equals" onclick="calculate()" rowspan="2">=</button>

                <!-- Row 7 -->
                <button class="btn btn-number btn-span-2" onclick="appendToDisplay('0')">0</button>
                <button class="btn btn-function" onclick="backspace()">⌫</button>
                <button class="btn btn-function" onclick="toggleSign()">±</button>

                <!-- Scientific Functions Row -->
                <button class="btn btn-function" onclick="appendToDisplay('asin(')">sin⁻¹</button>
                <button class="btn btn-function" onclick="appendToDisplay('acos(')">cos⁻¹</button>
                <button class="btn btn-function" onclick="appendToDisplay('atan(')">tan⁻¹</button>
                <button class="btn btn-function" onclick="appendToDisplay('exp(')">eˣ</button>
                <button class="btn btn-function" onclick="appendToDisplay('%')">%</button>

                <!-- Advanced Functions Row -->
                <button class="btn btn-function" onclick="solveQuadratic()">Quad</button>
                <button class="btn btn-function" onclick="memoryStore()">MS</button>
                <button class="btn btn-function" onclick="memoryRecall()">MR</button>
                <button class="btn btn-function" onclick="memoryClear()">MC</button>
                <button class="btn btn-history" onclick="showHistory()"><i class="fas fa-history"></i> History</button>
            </div>
        </div>
    </div>

    <!-- History Panel -->
    <div class="history-overlay" id="historyOverlay"></div>
    <div class="history-panel" id="historyPanel">
        <div class="history-header">
            <h3 class="history-title">Calculation History</h3>
            <button class="close-history" onclick="hideHistory()"><i class="fas fa-times"></i></button>
        </div>
        <div class="history-content" id="historyContent">
            <!-- History items will be populated here -->
        </div>
    </div>

    <script>
        let currentInput = '0';
        let expression = '';
        let memory = 0;
        let history = [];

        const resultElement = document.getElementById('result');
        const expressionElement = document.getElementById('expression');
        const historyContentElement = document.getElementById('historyContent');
        const historyPanel = document.getElementById('historyPanel');
        const historyOverlay = document.getElementById('historyOverlay');

        // Initialize calculator
        updateDisplay();

        function appendToDisplay(value) {
            if (currentInput === '0' && value !== '.') {
                currentInput = value;
            } else {
                currentInput += value;
            }
            updateDisplay();
        }

        function updateDisplay() {
            expressionElement.textContent = expression + currentInput;
            resultElement.textContent = currentInput;
        }

        function clearAll() {
            currentInput = '0';
            expression = '';
            updateDisplay();
        }

        function clearEntry() {
            currentInput = '0';
            updateDisplay();
        }

        function backspace() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        function toggleSign() {
            if (currentInput !== '0') {
                if (currentInput.startsWith('-')) {
                    currentInput = currentInput.substring(1);
                } else {
                    currentInput = '-' + currentInput;
                }
                updateDisplay();
            }
        }

        function calculate() {
            try {
                // Replace display symbols with JavaScript equivalents
                let calcExpression = expression + currentInput;
                calcExpression = calcExpression
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/π/g, 'Math.PI')
                    .replace(/e/g, 'Math.E')
                    .replace(/\^/g, '**');

                // Handle special functions
                calcExpression = calcExpression
                    .replace(/sin\(/g, 'Math.sin(')
                    .replace(/cos\(/g, 'Math.cos(')
                    .replace(/tan\(/g, 'Math.tan(')
                    .replace(/asin\(/g, 'Math.asin(')
                    .replace(/acos\(/g, 'Math.acos(')
                    .replace(/atan\(/g, 'Math.atan(')
                    .replace(/sqrt\(/g, 'Math.sqrt(')
                    .replace(/log\(/g, 'Math.log10(')
                    .replace(/ln\(/g, 'Math.log(')
                    .replace(/exp\(/g, 'Math.exp(');

                // Handle factorial (needs special implementation)
                calcExpression = calcExpression.replace(/(\d+)!/g, function(match, num) {
                    return factorial(parseInt(num));
                });

                const result = eval(calcExpression);

                // Add to history
                addToHistory(calcExpression, result);

                // Update display
                expression = '';
                currentInput = result.toString();
                updateDisplay();

            } catch (error) {
                showError('Error');
            }
        }

        function factorial(n) {
            if (n < 0) return NaN;
            if (n === 0 || n === 1) return 1;
            let result = 1;
            for (let i = 2; i <= n; i++) {
                result *= i;
            }
            return result;
        }

        function calculateFactorial() {
            try {
                const num = parseFloat(currentInput);
                if (num >= 0 && Number.isInteger(num)) {
                    const result = factorial(num);
                    addToHistory(`${num}!`, result);
                    currentInput = result.toString();
                    updateDisplay();
                } else {
                    showError('Invalid Input');
                }
            } catch (error) {
                showError('Error');
            }
        }

        function solveQuadratic() {
            // Prompt for coefficients
            const a = parseFloat(prompt('Enter coefficient a:', '1'));
            const b = parseFloat(prompt('Enter coefficient b:', '-5'));
            const c = parseFloat(prompt('Enter coefficient c:', '6'));

            if (isNaN(a) || isNaN(b) || isNaN(c)) {
                showError('Invalid Input');
                return;
            }

            try {
                const discriminant = b * b - 4 * a * c;
                if (discriminant >= 0) {
                    const sqrtDiscriminant = Math.sqrt(discriminant);
                    const root1 = (-b + sqrtDiscriminant) / (2 * a);
                    const root2 = (-b - sqrtDiscriminant) / (2 * a);

                    const result = `Roots: ${root1.toFixed(4)}, ${root2.toFixed(4)}`;
                    addToHistory(`Quadratic(${a}x² + ${b}x + ${c} = 0)`, result);
                    currentInput = result;
                    updateDisplay();
                } else {
                    // Complex roots
                    const realPart = -b / (2 * a);
                    const imaginaryPart = Math.sqrt(-discriminant) / (2 * a);

                    const result = `Roots: ${realPart.toFixed(4)} ± ${imaginaryPart.toFixed(4)}i`;
                    addToHistory(`Quadratic(${a}x² + ${b}x + ${c} = 0)`, result);
                    currentInput = result;
                    updateDisplay();
                }
            } catch (error) {
                showError('Error solving quadratic');
            }
        }

        function memoryStore() {
            memory = parseFloat(currentInput);
        }

        function memoryRecall() {
            currentInput = memory.toString();
            updateDisplay();
        }

        function memoryClear() {
            memory = 0;
        }

        function memoryAdd() {
            memory += parseFloat(currentInput);
        }

        function addToHistory(expr, result) {
            history.unshift({ expression: expr, result: result });
            if (history.length > 50) { // Keep only last 50 calculations
                history.pop();
            }
        }

        function updateHistoryDisplay() {
            historyContentElement.innerHTML = '';
            if (history.length === 0) {
                historyContentElement.innerHTML = '<div class="history-item">No calculations yet</div>';
                return;
            }

            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';

                const exprSpan = document.createElement('span');
                exprSpan.className = 'history-expression';
                exprSpan.textContent = item.expression;

                const resultSpan = document.createElement('span');
                resultSpan.className = 'history-result';
                resultSpan.textContent = '= ' + item.result;

                div.appendChild(exprSpan);
                div.appendChild(resultSpan);
                historyContentElement.appendChild(div);
            });
        }

        function showHistory() {
            updateHistoryDisplay();
            historyPanel.classList.add('active');
            historyOverlay.classList.add('active');
        }

        function hideHistory() {
            historyPanel.classList.remove('active');
            historyOverlay.classList.remove('active');
        }

        function clearHistory() {
            history = [];
            updateHistoryDisplay();
        }

        // Close history when clicking outside
        historyOverlay.addEventListener('click', hideHistory);

        // Close history with Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape' && historyPanel.classList.contains('active')) {
                hideHistory();
            }
        });

        function showError(message) {
            resultElement.textContent = message;
            resultElement.classList.add('error');
            setTimeout(() => {
                resultElement.classList.remove('error');
                currentInput = '0';
                updateDisplay();
            }, 1500);
        }

        // Keyboard support
        document.addEventListener('keydown', function(event) {
            const key = event.key;

            if (/[0-9]/.test(key)) {
                appendToDisplay(key);
            } else if (key === '.') {
                appendToDisplay('.');
            } else if (key === '+') {
                appendToDisplay('+');
            } else if (key === '-') {
                appendToDisplay('-');
            } else if (key === '*') {
                appendToDisplay('*');
            } else if (key === '/') {
                appendToDisplay('/');
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            } else if (key === 'Escape') {
                if (historyPanel.classList.contains('active')) {
                    hideHistory();
                } else {
                    clearAll();
                }
            } else if (key === 'Backspace') {
                backspace();
            } else if (key === '(') {
                appendToDisplay('(');
            } else if (key === ')') {
                appendToDisplay(')');
            } else if (key === '^') {
                appendToDisplay('^');
            } else if (key.toLowerCase() === 'h') {
                showHistory();
            }
        });

        // Add some visual effects
        const buttons = document.querySelectorAll('.btn');
        buttons.forEach(button => {
            button.addEventListener('click', function() {
                this.classList.add('glow');
                setTimeout(() => {
                    this.classList.remove('glow');
                }, 200);
            });
        });
    </script>
</body>
</html>
